<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="icon" type="image/svg+xml" href="./favicon.svg"><link rel="license" href="./xAgent.LICENSE.txt"><title>xAgent</title><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="preconnect" href="https://fonts.googleapis.com" crossorigin><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet" crossorigin></head><body><div id="root"></div><script type="text/javascript" src="./index.js"></script></body><script>let swRegMsg = '';
	if ('serviceWorker' in navigator) {
		window.addEventListener('load', () => {
			navigator.serviceWorker.register('./sw.js')
				.then(registration => {
					console.log('SW Reg: ', registration.scope);
					swRegMsg = `SW ${registration.scope}`;
				})
				.catch(error => {
					console.error('SW registration failed: ', error);
					swRegMsg = `SW failed ${registration.scope} | ${error}`;
				});
		});
	}
	document.getElementById('swRegMsg')?.textContent = swRegMsg;</script></html>
